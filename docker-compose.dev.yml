name: dogapi-ts-dev

# ============================================================
# Base PostgreSQL pour le développement local.
#   docker compose -f docker-compose.dev.yml up -d
# L'app tourne en local (`npm run dev`) et se connecte via DATABASE_URL
# (défaut : postgres://dogapi:dogapi@localhost:5433/dogapi — voir .env).
# Port hôte 5433 (et non 5432) pour éviter tout conflit avec un PostgreSQL
# natif déjà à l'écoute sur 5432. Identifiants faibles : usage dev uniquement.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: dogapi-ts-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dogapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dogapi}
      POSTGRES_DB: ${POSTGRES_DB:-dogapi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dogapi} -d ${POSTGRES_DB:-dogapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
