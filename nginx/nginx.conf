# ============================================================
# Nginx — reverse proxy / WAF devant l'application Node.
# Seul point d'entrée exposé en production. Ajoute des en-têtes de
# sécurité, limite la taille des corps et applique un rate-limiting réseau
# en complément du rate-limiting applicatif (express-rate-limit).
# ============================================================

# Zone de rate-limiting réseau (par IP).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream dogapi_app {
    server app:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Borne la taille des uploads au niveau réseau (aligné sur UPLOAD_MAX_SIZE + marge multipart).
    client_max_body_size 6m;

    # En-têtes de sécurité : posés par l'app (helmet, source de vérité unique) sur
    # toutes les réponses proxifiées. On conserve UNIQUEMENT `nosniff` au niveau
    # nginx pour durcir les réponses générées par nginx lui-même (413 si corps >
    # client_max_body_size, 502/503 quand l'app est indisponible) qui n'atteignent
    # pas helmet. Sur les réponses proxifiées c'est un doublon de valeur identique
    # (sans effet). Les autres en-têtes restent gérés par helmet seul pour éviter
    # les conflits (notamment X-XSS-Protection : helmet=0 vs ancien nginx=1).
    add_header X-Content-Type-Options "nosniff" always;
    server_tokens off;

    location / {
        # Rate-limiting réseau avec rafale tolérée.
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://dogapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # On ÉCRASE X-Forwarded-For avec l'IP réelle (et non $proxy_add_...) :
        # nginx étant la bordure, un XFF fourni par le client serait sinon
        # conservé et permettrait d'usurper l'IP vue par express-rate-limit.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}

